version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: forum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-forum}
      MYSQL_USER: ${MYSQL_USER:-forum_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-forum_password}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - forum-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  forum:
    image: beiane1/campus-forum:${FORUM_VERSION:-latest}
    container_name: campus-forum
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-forum_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-forum_password}
      DB_NAME: ${MYSQL_DATABASE:-forum}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${BACKEND_PORT:-3620}:3620"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - forum-network
    restart: unless-stopped

  webdav:
    image: bytemark/webdav
    container_name: forum-webdav
    environment:
      AUTH_TYPE: Basic
      USERNAME: ${WEBDAV_USER:-webdav_user}
      PASSWORD: ${WEBDAV_PASS:-webdav_pass}
    ports:
      - "${WEBDAV_PORT:-8080}:80"
    volumes:
      - webdav-data:/var/lib/dav
    networks:
      - forum-network
    restart: unless-stopped

volumes:
  mysql-data:
  webdav-data:

networks:
  forum-network:
    driver: bridge