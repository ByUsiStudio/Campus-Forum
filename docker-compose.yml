version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: forum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: forum
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - forum-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forum-backend
    expose:
      - "3620"
    volumes:
      - ./backend:/app
    depends_on:
      - mysql
    environment:
      - WAIT_HOSTS=mysql:3306
    networks:
      - forum-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forum-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - forum-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: forum-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - forum-network
    restart: unless-stopped

  webdav:
    image: bytemark/webdav
    container_name: forum-webdav
    environment:
      AUTH_TYPE: Basic
      USERNAME: webdav_user
      PASSWORD: webdav_pass
    expose:
      - "80"
    volumes:
      - webdav-data:/var/lib/dav
    networks:
      - forum-network
    restart: unless-stopped

volumes:
  mysql-data:
  webdav-data:

networks:
  forum-network:
    driver: bridge