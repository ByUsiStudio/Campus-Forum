<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 12px 16px 40px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.7;
    color: #1F2937;
    background: transparent;
    -webkit-text-size-adjust: 100%;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  h1, h2, h3, h4 { color: #111827; margin: 1.2em 0 0.5em; line-height: 1.35; font-weight: 700; }
  h1 { font-size: 1.6em; }
  h2 { font-size: 1.35em; border-left: 4px solid #6366F1; padding-left: 8px; }
  h3 { font-size: 1.15em; }
  p { margin: 0.6em 0; }
  a { color: #6366F1; text-decoration: none; border-bottom: 1px solid rgba(99,102,241,0.4); }
  ul, ol { padding-left: 1.4em; margin: 0.6em 0; }
  li { margin: 0.2em 0; }
  blockquote {
    margin: 0.8em 0; padding: 8px 12px;
    background: #F3F4F6; border-left: 4px solid #9CA3AF;
    color: #4B5563; border-radius: 4px;
  }
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    background: #F3F4F6; padding: 2px 5px; border-radius: 3px;
    font-size: 0.9em; color: #B91C1C;
  }
  pre {
    background: #1F2937; color: #F9FAFB; padding: 12px;
    border-radius: 6px; overflow-x: auto; font-size: 0.9em; line-height: 1.5;
  }
  pre code { background: transparent; padding: 0; color: inherit; font-size: 1em; }
  hr { border: none; border-top: 1px solid #E5E7EB; margin: 1.2em 0; }
  img { max-width: 100%; height: auto; border-radius: 4px; }
  table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
  th, td { border: 1px solid #E5E7EB; padding: 6px 10px; text-align: left; }
  th { background: #F9FAFB; font-weight: 600; }
  iframe, video, embed, object {
    max-width: 100%; width: 100%; border: 0;
    border-radius: 6px; margin: 0.6em 0;
  }
  .loading, .error { text-align: center; padding: 20px; color: #6B7280; font-size: 14px; }
  .error { color: #EF4444; }
</style>
</head>
<body>

<div id="content">
  <div class="loading" id="loading">加载中...</div>
  <div class="error" id="error" style="display:none"></div>
  <div id="article" style="display:none"></div>
</div>

<script src="marked.min.js"></script>
<script>
// 读取 URL 参数中的 articleId 并解码 URL 编码值
function getQueryParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}
function getQueryParamDecoded(name) {
  return decodeURIComponent(getQueryParam(name) || '');
}

// 读取 localStorage 中的 token（与 Android Cookie 同步）
function getToken() {
  try {
    // Android WebView 通过 Cookie 注入 auth_token
    var cookies = document.cookie.split(';');
    for (var i = 0; i < cookies.length; i++) {
      var pair = cookies[i].trim().split('=');
      if (pair[0] === 'auth_token' || pair[0] === 'token') {
        return pair[1] || '';
      }
    }
  } catch (e) {}
  return '';
}

// 从 URL 参数读取 baseApi 配置（由 ArticleContentView.kt 传递）
function getBaseApi() {
  return getQueryParamDecoded('baseApi') || 'https://xylt.cdifit.cn';
}

// 设置 marked.js 安全选项
if (typeof marked !== 'undefined') {
  marked.setOptions({
    breaks: true,
    gfm: true,
    renderer: new marked.Renderer()
  });
}

function render(markdown) {
  if (typeof marked !== 'undefined') {
    return marked.parse(markdown);
  }
  // fallback：简单转义
  return '<pre>' + markdown.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
}

function loadArticle() {
  var articleId = getQueryParam('articleId');
  var token = getToken();
  var baseApi = getBaseApi();

  console.log('开始加载文章:', { articleId: articleId, baseApi: baseApi, hasToken: !!token });

  if (!articleId) {
    showError('缺少文章 ID 参数');
    return;
  }

  var xhr = new XMLHttpRequest();
  xhr.open('GET', baseApi + '/api/articles/' + articleId, true);
  if (token) {
    xhr.setRequestHeader('Authorization', 'Bearer ' + token);
  }
  xhr.responseType = 'json';
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4) {
      console.log('XHR 完成:', { status: xhr.status, response: xhr.response });
      if (xhr.status === 200) {
        try {
          var data = typeof xhr.response === 'object' ? xhr.response : JSON.parse(xhr.responseText || '{}');
          var article = data.article || data;
          var content = article.content || article.content_html || '';
          console.log('文章内容长度:', content.length);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('article').style.display = 'block';
          document.getElementById('article').innerHTML = render(content);
        } catch (e) {
          console.error('解析失败:', e);
          showError('解析文章数据失败: ' + e.message);
        }
      } else {
        console.error('HTTP 错误:', xhr.status, xhr.responseText);
        showError('加载失败 (HTTP ' + xhr.status + ')');
      }
    }
  };
  xhr.onerror = function () {
    console.error('网络错误');
    showError('网络错误，请检查网络连接');
  };
  xhr.send();
}

function showError(msg) {
  console.error('显示错误:', msg);
  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('error');
  el.style.display = 'block';
  el.textContent = msg;
}

// 等待 DOM 加载完成
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadArticle);
} else {
  loadArticle();
}
</script>
</body>
</html>
