<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 12px 16px 40px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.7;
    color: #1F2937;
    background: #FFFFFF;
    -webkit-text-size-adjust: 100%;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  h1, h2, h3, h4 { color: #111827; margin: 1.2em 0 0.5em; line-height: 1.35; font-weight: 700; }
  h1 { font-size: 1.6em; }
  h2 { font-size: 1.35em; border-left: 4px solid #6366F1; padding-left: 8px; }
  h3 { font-size: 1.15em; }
  p { margin: 0.6em 0; }
  a { color: #6366F1; text-decoration: none; border-bottom: 1px solid rgba(99,102,241,0.4); }
  ul, ol { padding-left: 1.4em; margin: 0.6em 0; }
  li { margin: 0.2em 0; }
  blockquote {
    margin: 0.8em 0; padding: 8px 12px;
    background: #F3F4F6; border-left: 4px solid #9CA3AF;
    color: #4B5563; border-radius: 4px;
  }
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    background: #F3F4F6; padding: 2px 5px; border-radius: 3px;
    font-size: 0.9em; color: #B91C1C;
  }
  pre {
    background: #1F2937; color: #F9FAFB; padding: 12px;
    border-radius: 6px; overflow-x: auto; font-size: 0.9em; line-height: 1.5;
  }
  pre code { background: transparent; padding: 0; color: inherit; font-size: 1em; }
  hr { border: none; border-top: 1px solid #E5E7EB; margin: 1.2em 0; }
  img { max-width: 100%; height: auto; border-radius: 4px; }
  /* 表格容器 - 支持左右滑动 */
  .table-wrapper {
    overflow-x: auto;
    margin: 0.6em 0;
    border-radius: 6px;
    border: 1px solid #E5E7EB;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 600px; /* 确保表格足够宽时可滚动 */
  }
  th, td {
    border: 1px solid #E5E7EB;
    padding: 8px 12px;
    text-align: left;
  }
  th { background: #F9FAFB; font-weight: 600; }
  tr:nth-child(even) { background: #FAFAFA; }
  iframe, video, embed, object {
    max-width: 100%; width: 100%; border: 0;
    border-radius: 6px; margin: 0.6em 0;
  }
  .loading, .error { text-align: center; padding: 20px; color: #6B7280; font-size: 14px; }
  .error { color: #EF4444; }
  /* highlight.js 代码高亮样式 */
  .hljs { background: #1F2937; color: #c9d1d9; }
  .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name, .hljs-tag { color: #ff7b72; }
  .hljs-string, .hljs-title, .hljs-section, .hljs-attribute, .hljs-literal, .hljs-template-tag, .hljs-template-variable, .hljs-type, .hljs-addition { color: #a5d6ff; }
  .hljs-comment, .hljs-quote, .hljs-deletion, .hljs-meta { color: #8b949e; }
</style>
</head>
<body>

<div id="content">
  <div class="loading" id="loading">加载中...</div>
  <div class="error" id="error" style="display:none"></div>
  <div id="article" style="display:none"></div>
</div>

<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<script>
function getQueryParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}
function getQueryParamDecoded(name) {
  return decodeURIComponent(getQueryParam(name) || '');
}

function getToken() {
  try {
    var cookies = document.cookie.split(';');
    for (var i = 0; i < cookies.length; i++) {
      var pair = cookies[i].trim().split('=');
      if (pair[0] === 'auth_token' || pair[0] === 'token') {
        return pair[1] || '';
      }
    }
  } catch (e) {}
  return '';
}

function getBaseApi() {
  return getQueryParamDecoded('baseApi') || 'https://xylt.cdifit.cn';
}

/**
 * 将 Markdown 内容中的相对路径转换为绝对路径
 * 支持: 图片、视频、音频、链接
 */
function resolveRelativePaths(markdown, baseUrl) {
  if (!markdown) return '';
  
  // 移除末尾斜杠
  baseUrl = baseUrl.trimEnd('/');
  
  var result = markdown;
  
  // 处理图片: ![alt](path) 或 ![alt](path "title")
  result = result.replace(
    /!\[([^\]]*)\]\(([^)]+)(?:\s+"[^"]+")?\)/g,
    function(match, alt, path) {
      var resolvedPath = resolvePath(path, baseUrl);
      return '![' + alt + '](' + resolvedPath + ')';
    }
  );
  
  // 处理链接: [text](path) 或 [text](path "title")
  result = result.replace(
    /\[([^\]]*)\]\(([^)]+)(?:\s+"[^"]+")?\)/g,
    function(match, text, path) {
      var resolvedPath = resolvePath(path, baseUrl);
      return '[' + text + '](' + resolvedPath + ')';
    }
  );
  
  // 处理 HTML img 标签
  result = result.replace(
    /<img[^>]*src\s*=\s*["']([^"']+)["'][^>]*>/gi,
    function(match, src) {
      var resolvedSrc = resolvePath(src, baseUrl);
      return match.replace(src, resolvedSrc);
    }
  );
  
  // 处理 HTML video 标签
  result = result.replace(
    /<video[^>]*src\s*=\s*["']([^"']+)["'][^>]*>/gi,
    function(match, src) {
      var resolvedSrc = resolvePath(src, baseUrl);
      return match.replace(src, resolvedSrc);
    }
  );
  
  // 处理 HTML audio 标签
  result = result.replace(
    /<audio[^>]*src\s*=\s*["']([^"']+)["'][^>]*>/gi,
    function(match, src) {
      var resolvedSrc = resolvePath(src, baseUrl);
      return match.replace(src, resolvedSrc);
    }
  );
  
  // 处理 HTML source 标签（用于 video/audio）
  result = result.replace(
    /<source[^>]*src\s*=\s*["']([^"']+)["'][^>]*>/gi,
    function(match, src) {
      var resolvedSrc = resolvePath(src, baseUrl);
      return match.replace(src, resolvedSrc);
    }
  );
  
  return result;
}

/**
 * 解析单个路径
 */
function resolvePath(path, baseUrl) {
  // 如果已经是绝对 URL，直接返回
  if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(path)) {
    return path;
  }
  
  // 如果是根路径（以 / 开头）
  if (path.startsWith('/')) {
    return baseUrl + path;
  }
  
  // 如果是协议相对路径（以 // 开头）
  if (path.startsWith('//')) {
    return 'https:' + path;
  }
  
  // 相对路径，拼接 baseUrl
  return baseUrl + '/' + path;
}

/**
 * 渲染 Markdown 为 HTML
 */
function renderMarkdown(markdown, baseUrl) {
  // 先处理相对路径
  var resolvedMarkdown = resolveRelativePaths(markdown, baseUrl);
  
  // 设置 marked 选项
  marked.setOptions({
    breaks: true,
    gfm: true,
    renderer: new marked.Renderer()
  });
  
  // 自定义渲染器 - 为表格添加容器
  var renderer = new marked.Renderer();
  
  // 表格渲染 - 包裹在滚动容器中
  renderer.table = function(header, body) {
    return '<div class="table-wrapper"><table><thead>' + header + '</thead><tbody>' + body + '</tbody></table></div>';
  };
  
  // 使用自定义渲染器
  marked.setOptions({ renderer: renderer });
  
  // 渲染
  var html = marked.parse(resolvedMarkdown);
  
  // 对 code 块进行语法高亮
  var tempDiv = document.createElement('div');
  tempDiv.innerHTML = html;
  
  var codeBlocks = tempDiv.querySelectorAll('pre code');
  codeBlocks.forEach(function(block) {
    hljs.highlightElement(block);
  });
  
  return tempDiv.innerHTML;
}

function loadArticle() {
  var articleId = getQueryParam('articleId');
  var token = getToken();
  var baseApi = getBaseApi();

  console.log('加载文章:', { articleId: articleId, baseApi: baseApi });

  if (!articleId) {
    showError('缺少文章 ID 参数');
    return;
  }

  var xhr = new XMLHttpRequest();
  xhr.open('GET', baseApi + '/api/articles/' + articleId, true);
  if (token) {
    xhr.setRequestHeader('Authorization', 'Bearer ' + token);
  }
  xhr.responseType = 'json';
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = typeof xhr.response === 'object' ? xhr.response : JSON.parse(xhr.responseText || '{}');
          var article = data.article || data;
          var content = article.content || article.content_html || '';
          
          console.log('文章内容长度:', content.length);
          
          // 渲染 Markdown（包含路径解析和语法高亮）
          var htmlContent = renderMarkdown(content, baseApi);
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('article').style.display = 'block';
          document.getElementById('article').innerHTML = htmlContent;
        } catch (e) {
          console.error('解析失败:', e);
          showError('解析文章数据失败: ' + e.message);
        }
      } else {
        console.error('HTTP 错误:', xhr.status);
        showError('加载失败 (HTTP ' + xhr.status + ')');
      }
    }
  };
  xhr.onerror = function () {
    console.error('网络错误');
    showError('网络错误，请检查网络连接');
  };
  xhr.send();
}

function showError(msg) {
  console.error('错误:', msg);
  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('error');
  el.style.display = 'block';
  el.textContent = msg;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadArticle);
} else {
  loadArticle();
}
</script>
</body>
</html>
