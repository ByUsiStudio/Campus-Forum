<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="siteTitle">{{SITE_TITLE}}</title>
    <link rel="icon" type="image/svg+xml" href="/xylt.svg">

    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/Font/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
    </style>

    <script>
        fetch('/api/site-config')
            .then(response => response.json())
            .then(data => {
                const siteTitle = data.site_title || '{{SITE_TITLE}}';
                document.title = siteTitle;
                document.getElementById('siteTitle').textContent = siteTitle;
            })
            .catch(err => {
                console.log('加载网站配置失败，使用默认标题');
            });
    </script>
</head>
<body>
    <div id="app"></div>
    <script src="/layui/layui.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
