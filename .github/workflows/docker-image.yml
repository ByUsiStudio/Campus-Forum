name: Build and Push Complete Forum Image

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Get release version
      id: version
      run: |
        # 优先使用 release 事件的 tag_name
        if [ -n "${{ github.event.release.tag_name }}" ]; then
          VERSION="${{ github.event.release.tag_name }}"
        else
          # 降级使用 GITHUB_REF
          VERSION="${GITHUB_REF#refs/tags/}"
        fi
        
        # 移除可能的 v 前缀（如果需要）
        VERSION="${VERSION#v}"
        
        echo "release_version=$VERSION" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_ENV
        echo "获取到的版本号: $VERSION"
    
    - name: Build Vue frontend
      run: |
        cd frontend
        npm install
        npm run build
    
    - name: Build Go backend
      run: |
        cd backend
        if [ ! -f go.mod ]; then
          go mod init forum
        fi
        go mod tidy
        go mod download
        LDFLAGS="-X forum/controllers.FrontendVersion=${{ env.version }} -X forum/controllers.BackendVersion=${{ env.version }} -X forum/controllers.SwaggerVersion=${{ env.version }}"
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -ldflags "$LDFLAGS" -o forum-server -a -installsuffix cgo .
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: beiane1
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build Docker image
      run: |
        VERSION="${{ steps.version.outputs.release_version }}"
        
        # 创建 Dockerfile
        cat > Dockerfile << 'DOCKERFILE'
        FROM alpine:latest
        
        RUN apk add --no-cache ca-certificates tzdata nginx
        
        COPY backend/forum-server /app/forum-server
        COPY frontend/dist /usr/share/nginx/html
        COPY nginx/nginx.conf /etc/nginx/nginx.conf
        
        RUN chmod +x /app/forum-server
        
        RUN printf '#!/bin/sh\nnginx -g "daemon off;" &\n/app/forum-server' > /start.sh && chmod +x /start.sh
        
        EXPOSE 80 3620
        
        CMD ["/start.sh"]
        DOCKERFILE
        
        # 构建镜像
        docker build -t beiane1/campus-forum:latest \
          -t beiane1/campus-forum:$VERSION \
          -t beiane1/campus-forum:${{ github.sha }} \
          -t beiane1/campus-forum:build-${{ github.run_number }} .
        
        # 推送镜像
        docker push beiane1/campus-forum --all-tags
        
        echo "DOCKER_VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "DOCKER_IMAGE=beiane1/campus-forum:$VERSION" >> $GITHUB_OUTPUT
    
    - name: Generate deployment documents
      run: |
        VERSION="${{ steps.version.outputs.release_version }}"
        
        cat > 部署文档.md << EOF
        # Campus Forum 部署文档
        
        ## 版本信息
        
        | 组件 | 版本 |
        |------|------|
        | 后端 | ${VERSION} |
        | 前端 | ${VERSION} |
        | Docker 镜像 | beiane1/campus-forum:${VERSION} |
        
        ## 1. 拉取镜像
        
        \`\`\`bash
        docker pull beiane1/campus-forum:${VERSION}
        docker pull beiane1/campus-forum:latest
        \`\`\`
        
        ## 2. 创建 Docker 网络
        
        \`\`\`bash
        docker network create forum-network
        \`\`\`
        
        ## 3. 启动 MySQL（独立部署）
        
        \`\`\`bash
        docker run -d \\
          --name forum-mysql \\
          --network forum-network \\
          -e MYSQL_ROOT_PASSWORD=your_root_password \\
          -e MYSQL_DATABASE=forum \\
          -e MYSQL_USER=forum_user \\
          -e MYSQL_PASSWORD=your_forum_password \\
          -v mysql-data:/var/lib/mysql \\
          -p 3306:3306 \\
          mysql:8.0
        \`\`\`
        
        ## 4. 启动 Forum 应用
        
        \`\`\`bash
        docker run -d \\
          --name campus-forum \\
          --network forum-network \\
          -e DB_HOST=forum-mysql \\
          -e DB_PORT=3306 \\
          -e DB_USER=forum_user \\
          -e DB_PASSWORD=your_forum_password \\
          -e DB_NAME=forum \\
          -p 80:80 \\
          -p 3620:3620 \\
          beiane1/campus-forum:${VERSION}
        \`\`\`
        
        ---
        
        *文档生成时间: $(date '+%Y-%m-%d %H:%M:%S')*
        EOF
        
        echo "## 部署文档" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 镜像信息" >> $GITHUB_STEP_SUMMARY
        echo "- **版本**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker 镜像**: \`beiane1/campus-forum:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **拉取命令**: \`docker pull beiane1/campus-forum:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
    
    - name: Update release description
      uses: actions/github-script@v7
      if: github.event_name == 'release'
      with:
        script: |
          const version = '${{ steps.version.outputs.release_version }}';
          const currentBody = context.payload.release.body || '';
          const dockerSection = `\n\n---\n\n## Docker 镜像\n\n\`\`\`bash\n# 拉取镜像\ndocker pull beiane1/campus-forum:${version}\ndocker pull beiane1/campus-forum:latest\n\n# 启动容器\ndocker run -d \\\n  --name campus-forum \\\n  -p 80:80 \\\n  -p 3620:3620 \\\n  beiane1/campus-forum:${version}\n\`\`\`\n\n**Docker Hub**: https://hub.docker.com/r/beiane1/campus-forum`;
          
          // 避免重复添加
          let updatedBody = currentBody;
          if (!currentBody.includes('## Docker 镜像')) {
            updatedBody = currentBody + dockerSection;
          }
          
          github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            body: updatedBody
          });
    
    - name: Upload deployment document
      uses: actions/upload-artifact@v4
      with:
        name: 部署文档-${{ steps.version.outputs.release_version }}
        path: 部署文档.md
        retention-days: 30