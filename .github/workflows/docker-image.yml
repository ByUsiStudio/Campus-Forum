name: Build and Push Complete Forum Image

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build Go backend
      run: |
        cd backend
        go mod download
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o forum-server -a -installsuffix cgo .
    
    - name: Build Vue frontend
      run: |
        cd frontend
        npm install
        npm run build
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/campus-forum:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/campus-forum:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/campus-forum:${{ github.run_number }} \
          -f - . <<'EOF'
        FROM alpine:latest
        
        RUN apk add --no-cache ca-certificates tzdata nginx
        
        COPY backend/forum-server /app/forum-server
        COPY frontend/dist /usr/share/nginx/html
        COPY nginx/nginx.conf /etc/nginx/nginx.conf
        
        RUN chmod +x /app/forum-server
        
        RUN printf '#!/bin/sh\nnginx -g "daemon off;" &\n/app/forum-server' > /start.sh && chmod +x /start.sh
        
        EXPOSE 80 8080
        
        CMD ["/start.sh"]
        EOF
        
        docker push ${{ secrets.DOCKER_USERNAME }}/campus-forum --all-tags