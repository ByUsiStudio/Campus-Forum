<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Subject}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(103, 80, 164, 0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #6750A4 0%, #7C3AED 100%);
            padding: 32px;
            text-align: center;
        }
        .header .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .header h1 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .header p {
            color: rgba(255, 255, 255, 0.87);
            font-size: 14px;
        }
        .content {
            padding: 32px;
        }
        .greeting {
            margin-bottom: 24px;
        }
        .greeting p {
            color: #49454F;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .code-card {
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin: 24px 0;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .code-label {
            color: #6750A4;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .code {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            font-size: 36px;
            font-weight: 700;
            color: #6750A4;
            letter-spacing: 12px;
            text-shadow: 0 2px 4px rgba(103, 80, 164, 0.1);
        }
        .expiry {
            text-align: center;
            margin-top: 16px;
        }
        .expiry p {
            color: #6B7280;
            font-size: 13px;
        }
        .expiry strong {
            color: #9333EA;
        }
        .tips-card {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            border-radius: 0 12px 12px 0;
            padding: 20px;
            margin-top: 24px;
        }
        .tips-card h4 {
            color: #D97706;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .tips-card ul {
            list-style: none;
            padding: 0;
        }
        .tips-card li {
            color: #78716C;
            font-size: 13px;
            line-height: 1.8;
            padding-left: 20px;
            position: relative;
        }
        .tips-card li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #F59E0B;
            font-weight: 600;
        }
        .footer {
            background: #F9FAFB;
            padding: 24px 32px;
            border-top: 1px solid #E5E7EB;
            text-align: center;
        }
        .footer p {
            color: #9CA3AF;
            font-size: 12px;
        }
        .footer .brand {
            color: #6750A4;
            font-weight: 600;
        }
        @media (max-width: 480px) {
            body {
                padding: 20px 12px;
            }
            .header {
                padding: 24px 16px;
            }
            .content {
                padding: 24px 16px;
            }
            .code {
                font-size: 28px;
                letter-spacing: 8px;
            }
            .footer {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏛️</div>
            <h1>密码重置</h1>
            <p>校园论坛 · 安全验证</p>
        </div>
        <div class="content">
            <div class="greeting">
                <p>尊敬的用户，您好！</p>
                <p>您正在进行密码重置操作，请使用下方的验证码完成验证。</p>
            </div>
            <div class="code-card">
                <div class="code-label">验证码</div>
                <div class="code">{{.Code}}</div>
            </div>
            <div class="expiry">
                <p><strong>验证码有效期：15分钟</strong></p>
            </div>
            <div class="tips-card">
                <h4>安全提示</h4>
                <ul>
                    <li>请勿将验证码泄露给他人</li>
                    <li>如果不是您本人操作，请忽略此邮件</li>
                    <li>如遇问题请联系管理员</li>
                </ul>
            </div>
        </div>
        <div class="footer">
            <p>感谢您使用 <span class="brand">校园论坛</span>！</p>
        </div>
    </div>
</body>
</html>
