server {
    listen 80;
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为您的域名

    # SSL证书配置（如果使用HTTPS）
    ssl_certificate /www/server/panel/vhost/cert/your-domain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 文件上传大小限制
    client_max_body_size 100M;

    # 日志配置
    access_log /www/wwwlogs/your-domain.com.log;
    error_log /www/wwwlogs/your-domain.com.error.log;

    # 前端静态文件目录（Vue打包后的dist目录）
    root /www/wwwroot/your-domain.com/dist;
    index index.html index.htm;

    # ============ WebDAV 代理（必须放在Vue路由之前）============
    location ^~ /proxy/webdav {
        proxy_pass http://103.205.240.88:3620/proxy/webdav;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件支持 - 禁用缓冲和缓存
        proxy_buffering off;
        proxy_cache off;

        # 增加超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 支持字节范围请求（用于大文件分段下载/视频播放）
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_ignore_client_abort on;

        # 传递原始响应头
        proxy_pass_header Content-Type;
        proxy_pass_header Content-Disposition;
        proxy_pass_header Content-Length;

        # 添加安全响应头
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
    }

    # ============ API 代理 ============
    location ^~ /api {
        proxy_pass http://103.205.240.88:3620;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置 - 增加到10分钟（适用于大文件上传）
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 禁用缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # 大文件支持
        client_max_body_size 200M;
    }

    # ============ Vue 路由（必须放在最后）============
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============ 静态资源缓存 ============
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm|ogg|mov)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ============ 禁止访问隐藏文件 ============
    location ~ /\. {
        deny all;
    }
}
